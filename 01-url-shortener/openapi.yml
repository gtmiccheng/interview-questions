openapi: 3.0.3
info:
  title: URL Shortener API
  description: >
    A simple URL shortener service that allows clients to create shortened URLs
    and be redirected to the original destination via a 302 redirect.
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: http://localhost:3000/v1
    description: Development server

tags:
  - name: URLs
    description: Operations for creating and resolving shortened URLs

paths:

  /urls:
    post:
      tags:
        - URLs
      summary: Create a shortened URL
      description: >
        Creates a new autogenerated shortened URL for the given destination URL.
      operationId: createShortUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUrlRequest'
            examples:
              auto_slug:
                summary: Auto-generated slug
                value:
                  destination_url: "https://www.example.com/some/very/long/path?query=value"
      responses:
        '201':
          description: Shortened URL created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUrlResponse'
              examples:
                success:
                  summary: Successful creation
                  value:
                    id: "a1b2c3d4"
                    short_url: "https://short.example.com/a1b2c3d4"
                    destination_url: "https://www.example.com/some/very/long/path?query=value"
                    slug: "a1b2c3d4"
                    created_at: "2026-07-01T02:30:00Z"
        '400':
          description: Bad request — invalid or missing destination URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_url:
                  summary: Missing destination_url
                  value:
                    error: "VALIDATION_ERROR"
                    message: "destination_url is required and must be a valid URL."
        '422':
          description: Unprocessable entity — destination URL is syntactically valid but cannot be accepted (e.g. blocked domain)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /{slug}:
    get:
      servers:
        - url: http://localhost:3000
          description: Development server
      tags:
        - URLs
      summary: Redirect to destination URL
      description: >
        Resolves the given slug and issues a 302 Found redirect to the
        original destination URL. This endpoint is served from the short
        domain (e.g. short.example.com) rather than the API subdomain.
      operationId: redirectToDestination
      parameters:
        - name: slug
          in: path
          required: true
          description: The slug portion of the shortened URL.
          schema:
            type: string
            example: a1b2c3d4
      responses:
        '302':
          description: Redirect to the destination URL
          headers:
            Location:
              description: The original destination URL to redirect the client to.
              schema:
                type: string
                format: uri
                example: "https://www.example.com/some/very/long/path?query=value"
        '404':
          description: Slug not found — no shortened URL exists for this slug
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                not_found:
                  summary: Slug not found
                  value:
                    error: "NOT_FOUND"
                    message: "No shortened URL found for slug 'xyz99'."
        '410':
          description: Gone — the shortened URL existed but has been deleted or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:

    CreateUrlRequest:
      type: object
      required:
        - destination_url
      properties:
        destination_url:
          type: string
          format: uri
          description: The full destination URL that the shortened link should redirect to.
          example: "https://www.example.com/some/very/long/path?query=value"

    CreateUrlResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique internal identifier for the shortened URL record.
          example: "a1b2c3d4"
        slug:
          type: string
          description: The slug used in the shortened URL.
          example: "a1b2c3d4"
        short_url:
          type: string
          format: uri
          description: The full shortened URL that clients can share and visit.
          example: "https://short.example.com/a1b2c3d4"
        destination_url:
          type: string
          format: uri
          description: The original destination URL this shortened link points to.
          example: "https://www.example.com/some/very/long/path?query=value"
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the shortened URL was created.
          example: "2026-07-01T02:30:00Z"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: A machine-readable error code.
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: A human-readable description of the error.
          example: "destination_url is required and must be a valid URL."
